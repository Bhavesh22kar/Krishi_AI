<!DOCTYPE html>
<html>
<head>
    <title>Krishi AI Guardian</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<h1>🌾 Krishi AI Guardian</h1>
<h3>🌱 Smart Farming Assistant</h3>

<div class="container">

    <button onclick="uploadImage()">📸 Disease Detection</button>
    <button onclick="getWeather()">🌦️ Weather</button>
    <button onclick="getPrice()">💰 Market Price</button>
    <button onclick="getIrrigation()">💧 Irrigation</button>
    <button onclick="startVoice()">🗣️ Voice Assistant</button>

</div>


<input type="file" id="imageInput" style="display:none;">
<button onclick="uploadImage()" id="uploadBtn">
📁 Upload Leaf Image
</button>
<img id="preview" width="200" style="
margin-top:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
">

<div id="spinner" style="display:none;">
    ⏳ Processing...
</div>
<h3>🌿 Result</h3>
<div id="output"></div>

<select id="languageSelect" style="
padding:10px;
border-radius:10px;
margin-top:10px;
">
    <option value="hi">🇮🇳 Hindi</option>
    <option value="en">🇺🇸 English</option>
    <option value="mr">🇮🇳 Marathi</option>
</select>


<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.9.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script src="script2.js"></script>


</body>
</html>
